name: Build and Deploy Demo Site

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [game-client-updated]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE: scratchee-demo-site
      REGISTRY: localhost:30500
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Checkout demo-site
        uses: actions/checkout@v4
        with:
          path: demo-site

      - name: Checkout game-client
        uses: actions/checkout@v4
        with:
          repository: scratchee-engine/game-client
          path: demo-site/game-client
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          # Force skip TLS verify — cluster cert doesn't include k3s-cp.game.scratchee.com in SANs
          # Remove certificate-authority-data to avoid conflict with insecure flag
          sed -i '/certificate-authority-data:/d' "$HOME/.kube/config"
          sed -i 's|server: https://k3s-cp|insecure-skip-tls-verify: true\n    server: https://k3s-cp|' "$HOME/.kube/config"

      - name: Start registry port-forward
        run: |
          kubectl port-forward -n kube-system service/registry 30500:5000 &
          echo $! > /tmp/port-forward.pid

          # Wait up to 30s for port to be ready
          for i in {1..30}; do
            if nc -z localhost 30500; then
              echo "Port-forward ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Verify one more time or fail
          nc -z localhost 30500 || { echo "Port-forward failed to establish"; exit 1; }

      - name: Configure insecure registry
        run: |
          echo '{"insecure-registries": ["localhost:30500"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 3

      - name: Build and push image
        run: |
          docker build \
            --platform linux/amd64 \
            -f demo-site/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }} \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to k8s
        run: |
          kubectl get deployment/demo-site -n scratchee-test || { echo "Deployment missing"; exit 1; }
          kubectl rollout restart deployment/demo-site -n scratchee-test
          kubectl rollout status deployment/demo-site -n scratchee-test --timeout=120s

      - name: Debug rollout failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n scratchee-test -l app=demo-site -o wide
          echo "=== Recent Events ==="
          kubectl get events -n scratchee-test --field-selector involvedObject.name=demo-site --sort-by='.lastTimestamp' | tail -20
          echo "=== Pod Logs ==="
          kubectl logs -n scratchee-test -l app=demo-site --tail=50 || true

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/port-forward.pid ]; then
            kill $(cat /tmp/port-forward.pid) || true
            rm -f /tmp/port-forward.pid
          fi
          rm -f "$HOME/.kube/config"
